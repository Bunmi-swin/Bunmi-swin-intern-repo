name: Markdown Linting and Spellchecks

on:
  pull_request:
    paths:
      - '**/*.md'

jobs:
  md-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install -g markdownlint-cli2 cspell
      - run: markdownlint-cli2 "**/*.md"
      - run: cspell "**/*.md"
